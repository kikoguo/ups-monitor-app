name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          pub-cache: https://pub.flutter-io.cn
          storage-url: https://storage.flutter-io.cn
      
      - name: Add China mirror
        run: |
          git config --global url."https://github.com.cnpmjs.org/".insteadOf "https://github.com/"
          git config --global url."https://pub.flutter-io.cn/".insteadOf "https://pub.dev/"
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Web
        run: flutter build web --release --base-href /ups-monitor-app/ --no-wasm-dry-run
      
      - name: Fix flutter_bootstrap.js
        run: |
          # Remove empty build objects from buildConfig that cause Flutter initialization to fail
          sed -i 's/,{}]/]/g' build/web/flutter_bootstrap.js
      
      - name: Verify build
        run: |
          echo "=== Checking index.html base href ==="
          grep "base href" build/web/index.html
          echo "=== Checking flutter_bootstrap.js buildConfig ==="
          grep "buildConfig" build/web/flutter_bootstrap.js
          echo "=== Checking main.dart.js size ==="
          ls -la build/web/main.dart.js
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
