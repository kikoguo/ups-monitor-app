name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          pub-cache: https://pub.flutter-io.cn
          storage-url: https://storage.flutter-io.cn
      
      - name: Add China mirror
        run: |
          git config --global url."https://github.com.cnpmjs.org/".insteadOf "https://github.com/"
          git config --global url."https://pub.flutter-io.cn/".insteadOf "https://pub.dev/"
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build Web
        run: flutter build web --release --base-href /ups-monitor-app/ --no-wasm-dry-run
      
      - name: Fix flutter_bootstrap.js and remove service worker
        run: |
          # Remove empty build objects from buildConfig
          sed -i 's/,{}]/]/g' build/web/flutter_bootstrap.js
          # Disable service worker registration using Python (sed can't handle multiline)
          python3 -c "
          import re
          with open('build/web/flutter_bootstrap.js', 'r') as f:
              content = f.read()
          # Replace _flutter.loader.load({...serviceWorkerSettings...}) with _flutter.loader.load({})
          content = re.sub(r'_flutter\.loader\.load\(\{[^}]*serviceWorkerSettings[^}]*\}[^}]*\}', '_flutter.loader.load({})', content, flags=re.DOTALL)
          with open('build/web/flutter_bootstrap.js', 'w') as f:
              f.write(content)
          print('Fixed flutter_bootstrap.js: removed serviceWorkerSettings')
          "
          # Delete service worker file
          rm -f build/web/flutter_service_worker.js
      
      - name: Verify build
        run: |
          echo "=== Checking index.html base href ==="
          grep "base href" build/web/index.html
          echo "=== Checking flutter_bootstrap.js buildConfig ==="
          grep "buildConfig" build/web/flutter_bootstrap.js
          echo "=== Checking main.dart.js size ==="
          ls -la build/web/main.dart.js
          echo "=== Service worker file should not exist ==="
          ls build/web/flutter_service_worker.js 2>&1 || echo "GOOD: service worker file removed"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
