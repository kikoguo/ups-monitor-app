<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Marsriva IoT - 智能设备管理">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ups_monitor_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Marsriva IoT</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F5F7FA;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E8E8E8;
      border-top-color: #4A90D9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <div>加载中...</div>
  </div>

  <script src="flutter_bootstrap.js"></script>
  <script>
    // Unregister old service workers that break main.dart.js loading
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var i = 0; i < registrations.length; i++) {
          registrations[i].unregister();
          console.log('Unregistered old service worker');
        }
      });
      // Also clear caches
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (var i = 0; i < names.length; i++) caches.delete(names[i]);
        });
      }
    }
    // Auto-hide loading indicator when Flutter is ready
    var checkInterval = setInterval(function() {
      var flutterView = document.querySelector('flt-glass-pane') || document.querySelector('flutter-view');
      if (flutterView) {
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
        clearInterval(checkInterval);
      }
    }, 500);
    // Fallback: hide after 30 seconds regardless
    setTimeout(function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
      clearInterval(checkInterval);
    }, 30000);
  </script>
</body>
</html>
